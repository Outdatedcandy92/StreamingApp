<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        .rounded-div:first-of-type {
            background: url('https://m.media-amazon.com/images/M/MV5BYmQ4YWMxYjUtNjZmYi00MDQ1LWFjMjMtNjA5ZDdiYjdiODU5XkEyXkFqcGdeQXVyMTMzNDExODE5._V1_SX300.jpg');
            background-size: cover;
            background-position: center;
        }
        .rounded-div-wrapper{
            transition: transform 0.3s ease;
        }
        .rounded-div-wrapper:hover{
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <img src="Artwork/logo-01.png" alt="Logo">
        </div>
        <div class="navbar-search">
            <input type="text" id="search-input" placeholder="Search for a movie...">
            <i class="fas fa-search"></i>
        </div>
        <div class="navbar-icons">
            <i class="fas fa-cog"></i>
            <i class="fas fa-expand"></i>
            <i class="fas fa-user"></i>
        </div>
    </nav>

    <div class="full-width-container">
        <div class="content-row">
            <div class="top-div">
                <span class="left-text">Results</span>
            </div>
            <div class="rounded-div-container">
                <div class="rounded-div-wrapper">

                    <div class="rounded-div"></div>
                    <div class="below-text">Hmm</div>

                </div>
            </div>
        </div>
    </div>




</body>

</html>
