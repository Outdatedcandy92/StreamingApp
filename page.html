<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page</title>
  <link rel="stylesheet" href="page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="overlay">
    <div class="overlay-img"></div>
  </div>

  <div class="top-layer">

    <nav id="item-nav">
      <div class="navbar-icons">
        <i class="fas fa-user"></i>
        <i class="fas fa-cog"></i>
        <i class="fas fa-expand"></i>
      </div>
    </nav>
    <div class="content">


      <div class="column left-column">
        <div class="top-div">
          <img src="https://images.metahub.space/logo/medium/tt0372784/img" alt="Image">
        </div>
        <div class="bottom-div">
          <div class="Rating-Div">
            <div class="rating-item">120 min</div>
            <div class="rating-item">2012</div>
            <div class="rating-item">IMDB</div>
          </div>

          <div class="info">
            <div class="info-item">
              <div class="title">Genres</div>
              <div class="contentdiv">Action, Crime, Thriller</div>
            </div>
            <div class="info-item">
              <div class="title">Cast</div>
              <div class="contentdiv">Robert Pattinson, Jeffery ...</div>
            </div>
            <div class="info-item">
              <div class="title">Director</div>
              <div class="contentdiv">Matt Revees</div>
            </div>
            <div class="info-item">
              <div class="title">Summary</div>
              <div class="contentdiv">The Dark Knight of Gotham City begins his war on crime with his first major enemy
                being Jack Napier, a criminal who becomes the clownishly homicidal Joker.</div>
            </div>
          </div>
        </div>
      </div>



      <div class="column middle-column">
        <!-- will leave empty -->
      </div>
      <div class="column right-column">
        

        <div class="player-container">
          
        </div>
      </div>
    </div>

  </div>



</body>

</html>
